<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="background"></div>
    <div id="particles-container"></div>
    
    <div class="scene-container">
        <!-- SCENE 1: Phong bì -->
        <div class="scene" id="scene-envelope">
            <div class="card-wrapper">
                <div class="letter" id="letter">
                    <div class="letter-content">
                        <div class="typing-text" id="typingText"></div>
                    </div>
                </div>

                <div class="envelope-wrapper" id="envelope">
                    <div class="top-flap"></div>
                    <div class="envelope-front"></div>
                </div>
            </div>

            <button id="openBtn" class="btn-primary">Mở thư</button>
            <button id="certificateBtn" class="btn-primary btn-certificate" style="display: none; margin-top: 20px;">Mời bạn nhận chứng chỉ</button>
        </div>

        <!-- SCENE 2: Chứng chỉ -->
        <div class="scene" id="scene-certificate" style="display: none;">
            <div class="certificate-container">
                <img id="certificateImage" src="assets/Certificate.png" alt="Certificate" class="certificate-image">
                <button id="downloadBtn" class="btn-primary btn-download">📥 Tải chứng chỉ</button>
                <button id="backBtn" class="btn-primary btn-back">← Quay lại</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>

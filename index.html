<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="background"></div>
    <div id="particles-container"></div>
    
    <div class="scene-container">
        <!-- SCENE 1: Phong bì -->
        <div class="scene" id="scene-envelope">
            <div class="card-wrapper">
                <div class="letter" id="letter">
                    <div class="letter-content">
                        <div class="typing-text" id="typingText"></div>
                    </div>
                </div>

                <div class="envelope-wrapper" id="envelope">
                    <div class="top-flap"></div>
                    <div class="envelope-front"></div>
                </div>
            </div>

            <button id="openBtn" class="btn-primary">Mở thư</button>
            <button id="certificateBtn" class="btn-primary btn-certificate" style="display: none; margin-top: 20px;">Mời bạn nhận chứng chỉ</button>
        </div>

        <!-- SCENE 2: Chứng chỉ -->
        <div class="scene" id="scene-certificate" style="display: none;">
            <div class="certificate-container">
                <img id="certificateImage" src="assets/Certificate.png" alt="Certificate" class="certificate-image">
                <div class="button-group">
                    <button id="downloadBtn" class="btn-primary btn-download">📥 Tải chứng chỉ</button>
                    <button id="giftBtn" class="btn-primary btn-gift">Nhận thêm quà ✨</button>
                    <button id="backBtn" class="btn-primary btn-back">← Quay lại</button>
                </div>
            </div>
        </div>

        <!-- SCENE 3: Gift Box -->
        <div class="scene" id="scene-gift" style="display: none;">
            <div class="gift-modal-backdrop" id="giftBackdrop"></div>
            <div class="gift-modal">
                <div class="gift-box" id="giftBox">
                    <div class="gift-box-top">
                        <div class="gift-ribbon-h gift-ribbon-h-1"></div>
                        <div class="gift-ribbon-h gift-ribbon-h-2"></div>
                    </div>
                    <div class="gift-ribbon-v gift-ribbon-v-1"></div>
                    <div class="gift-ribbon-v gift-ribbon-v-2"></div>
                    <div class="gift-box-body"></div>
                    <div class="gift-shine"></div>
                </div>
                <div class="gift-hint" id="giftHint">Tap tap thử xem? 👀</div>
            </div>

            <!-- Voucher -->
            <div class="voucher-container" id="voucherContainer" style="display: none; opacity: 0;">
                <button id="giftBackBtn" class="btn-primary btn-back">← Quay lại</button>
                <div class="voucher">
                    <div class="voucher-decoration voucher-top"></div>
                    <div class="voucher-content">
                        <div class="voucher-line">
                            <span class="voucher-label">Tặng cho:</span>
                            <span class="voucher-text" id="voucherRecipient"></span>
                        </div>
                        <div class="voucher-divider"></div>
                        <div class="voucher-line">
                            <span class="voucher-label">Phần thưởng:</span>
                            <span class="voucher-text voucher-reward" id="voucherReward"></span>
                        </div>
                        <div class="voucher-divider"></div>
                        <div class="voucher-line">
                            <span class="voucher-label">Nhắn nhủ:</span>
                            <span class="voucher-text voucher-message" id="voucherMessage"></span>
                        </div>
                    </div>
                    <div class="voucher-decoration voucher-bottom"></div>
                </div>
                <div class="voucher-final-text" id="voucherFinalText"></div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
